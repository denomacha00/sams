name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sams_test
          POSTGRES_PASSWORD: sams_test_pass
          POSTGRES_DB: sams_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://sams_test:sams_test_pass@localhost:5432/sams_test

      - name: Run tests
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: postgresql://sams_test:sams_test_pass@localhost:5432/sams_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          QR_SECRET: test-qr-secret
          NODE_ENV: test

      - name: Build all packages
        run: npm run build --workspaces --if-present

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/sams
            git pull origin main
            npm ci --production=false
            npm run build --workspaces --if-present
            cd packages/backend && npx prisma migrate deploy && cd ../..
            pm2 reload ecosystem.config.js --env production
            sudo nginx -t && sudo systemctl reload nginx

# ─── SAMS NGINX Configuration ──────────────────────────────────────────────────
# Virtual hosts for sams.ke (frontend), api.sams.ke (backend), super.sams.ke (super-admin)

# ─── Rate Limiting Zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ─── Upstream ─────────────────────────────────────────────────────────────────
upstream sams_api {
    server 127.0.0.1:3001;
}

# ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name smart-managment.com www.smart-managment.com api.smart-managment.com super.smart-managment.com;
    return 301 https://$host$request_uri;
}

# ─── Frontend SPA (sams.ke) ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name smart-managment.com www.smart-managment.com;

    # SSL Configuration (Cloudflare Origin Certificate or Certbot)
    ssl_certificate /etc/ssl/smart-managment.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/smart-managment.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/sams/packages/frontend/dist;
    index index.html;

    # Static asset caching (1 year for hashed assets)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}

# ─── API Backend (api.sams.ke) ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.smart-managment.com;

    # SSL Configuration (Cloudflare Origin Certificate or Certbot)
    ssl_certificate /etc/ssl/smart-managment.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/smart-managment.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting for login endpoint
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://sams_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for Socket.io
    location /socket.io/ {
        proxy_pass http://sams_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API proxy with rate limiting
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://sams_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # CORS headers (handled by Express, but fallback)
        add_header Access-Control-Allow-Origin "https://smart-managment.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # Request body size limit
    client_max_body_size 10m;
}

# ─── Super Admin Panel (super.sams.ke) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name super.smart-managment.com;

    # SSL Configuration (Cloudflare Origin Certificate or Certbot)
    ssl_certificate /etc/ssl/smart-managment.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/smart-managment.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # IP Allowlist — restrict access to known admin IPs
    # Update these with your actual admin IP addresses
    allow 41.0.0.0/8;       # Kenya IP range (adjust as needed)
    allow 127.0.0.1;        # Localhost
    allow 10.0.0.0/8;       # Private network
    deny all;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/sams/packages/super-admin/dist;
    index index.html;

    # Static asset caching (1 year for hashed assets)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy API requests to backend
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://sams_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
